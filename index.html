<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AIN — Agriculture Innovate Network</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--navy:#0D1B4B;--navy2:#1a237e;--navy3:#1565C0;--gold:#F59E0B;--gold2:#FBBF24;--gold-l:#FEF3C7;--bg:#EEF2FF;--card:#fff;--border:#C7D2FE;--text:#0D1B4B;--text2:#5C6BC0;--accent:#10B981;--danger:#EF4444;--radius:16px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Nunito',sans-serif;background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;background-image:radial-gradient(ellipse at 10% 0%,rgba(26,35,126,0.12) 0%,transparent 60%),radial-gradient(ellipse at 90% 100%,rgba(245,158,11,0.08) 0%,transparent 60%);}
.wrap{width:100%;max-width:430px;padding:24px 16px 40px;}
.hero{text-align:center;margin-bottom:28px;animation:fadeDown 0.6s ease;}
.logo-ring{width:96px;height:96px;border-radius:50%;background:linear-gradient(135deg,var(--navy2),var(--navy3));border:3px solid var(--gold);margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:44px;box-shadow:0 8px 32px rgba(26,35,126,0.30),0 0 0 6px rgba(245,158,11,0.15);}
.brand-name{font-size:30px;font-weight:900;color:var(--navy);letter-spacing:1px;}
.brand-name span{color:var(--gold);}
.brand-sub{font-size:11px;font-weight:700;letter-spacing:2.5px;color:var(--text2);text-transform:uppercase;margin-top:4px;}
.brand-tagline{font-size:13px;color:var(--text2);font-weight:600;margin-top:8px;line-height:1.5;}
.features{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.feat-item{background:linear-gradient(135deg,var(--navy2),var(--navy3));border-radius:14px;padding:14px 12px;text-align:center;}
.feat-ico{font-size:24px;margin-bottom:6px;}
.feat-lbl{font-size:12px;font-weight:800;color:#fff;}
.feat-sub{font-size:11px;color:rgba(255,255,255,0.75);font-weight:600;margin-top:2px;}
.card{background:var(--card);border-radius:20px;padding:24px 20px;margin-bottom:16px;box-shadow:0 4px 24px rgba(13,27,75,0.08);border:1px solid var(--border);animation:fadeUp 0.5s ease;}
.tabs{display:flex;background:var(--bg);border-radius:12px;padding:4px;margin-bottom:22px;gap:4px;}
.tab-btn{flex:1;padding:11px;border:none;border-radius:9px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:800;cursor:pointer;transition:all 0.25s;color:var(--text2);background:transparent;}
.tab-btn.active{background:var(--navy2);color:#fff;box-shadow:0 3px 12px rgba(26,35,126,0.25);}
.form-group{margin-bottom:16px;}
.form-group label{display:block;font-size:13px;font-weight:800;color:var(--text);margin-bottom:6px;}
.input-wrap{position:relative;}
.input-ico{position:absolute;left:13px;top:50%;transform:translateY(-50%);font-size:16px;pointer-events:none;}
.input-wrap input,.input-wrap select{width:100%;padding:13px 13px 13px 40px;border:2px solid var(--border);border-radius:12px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;color:var(--text);background:#fff;outline:none;-webkit-appearance:none;transition:border-color 0.2s;}
.input-wrap input:focus,.input-wrap select:focus{border-color:var(--navy2);box-shadow:0 0 0 3px rgba(26,35,126,0.10);}
.ref-badge{background:var(--gold-l);border:1.5px solid rgba(245,158,11,0.30);border-radius:10px;padding:10px 14px;margin-bottom:16px;display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:#92400E;}
.forgot-link{display:block;text-align:right;font-size:12px;color:var(--navy2);font-weight:700;cursor:pointer;margin-top:-8px;margin-bottom:14px;}
.btn{width:100%;padding:14px;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;cursor:pointer;transition:all 0.2s;}
.btn-navy{background:linear-gradient(135deg,var(--navy2),var(--navy3));color:#fff;box-shadow:0 4px 16px rgba(26,35,126,0.30);}
.btn-navy:hover{transform:translateY(-1px);}
.btn-navy:disabled{opacity:0.6;cursor:not-allowed;transform:none;}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:var(--navy);box-shadow:0 4px 16px rgba(245,158,11,0.30);}
.btn-gold:disabled{opacity:0.6;cursor:not-allowed;}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.stat-card{background:var(--card);border-radius:14px;padding:14px 10px;text-align:center;box-shadow:0 2px 12px rgba(13,27,75,0.06);border:1px solid var(--border);}
.stat-num{font-size:20px;font-weight:900;color:var(--navy2);}
.stat-lbl{font-size:11px;color:var(--text2);font-weight:600;margin-top:3px;}
.form-tab{display:none;}.form-tab.active{display:block;}
.divider{text-align:center;font-size:11px;color:var(--text2);font-weight:700;margin:14px 0;position:relative;}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:var(--border);}
.divider::before{left:0;}.divider::after{right:0;}
.spinner{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-18px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.toast-wrap{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none;}
.toast{background:var(--text);color:#fff;padding:12px 22px;border-radius:50px;font-size:13px;font-weight:700;white-space:nowrap;opacity:0;transform:translateY(20px);transition:all 0.3s ease;max-width:340px;text-align:center;pointer-events:none;}
.toast.show{opacity:1;transform:translateY(0);}
.toast.success{background:var(--accent);}
.toast.error{background:var(--danger);}
.toast.gold{background:var(--gold);color:var(--navy);}
.error-box{background:#FEE2E2;border:1.5px solid rgba(239,68,68,0.30);border-radius:12px;padding:10px 14px;margin-bottom:14px;font-size:13px;font-weight:700;color:#DC2626;display:none;align-items:center;gap:8px;}
/* ── ONBOARDING SCREENS ── */
.onboarding{position:fixed;inset:0;z-index:9000;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 24px;transition:opacity 0.4s ease,transform 0.4s ease;}
.onboarding.hide{opacity:0;transform:scale(0.95);pointer-events:none;}
.ob-bg{position:absolute;inset:0;}
.ob-particles{position:absolute;inset:0;overflow:hidden;pointer-events:none;}
.ob-particle{position:absolute;width:6px;height:6px;border-radius:50%;animation:floatUp linear infinite;}
@keyframes floatUp{0%{transform:translateY(100vh) rotate(0);opacity:1;}100%{transform:translateY(-100px) rotate(360deg);opacity:0;}}
.ob-content{position:relative;z-index:2;text-align:center;max-width:360px;}
.ob-ico{font-size:80px;margin-bottom:16px;animation:obBounce 2s ease-in-out infinite;}
@keyframes obBounce{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(-12px) scale(1.05);}}
.ob-step{font-size:11px;font-weight:900;letter-spacing:3px;text-transform:uppercase;margin-bottom:16px;padding:5px 16px;border-radius:50px;display:inline-block;}
.ob-title{font-size:26px;font-weight:900;line-height:1.25;margin-bottom:12px;}
.ob-sub{font-size:14px;font-weight:600;line-height:1.7;margin-bottom:10px;}
.ob-highlight{font-size:18px;font-weight:900;padding:10px 20px;border-radius:14px;display:inline-block;margin-bottom:28px;}
.ob-dots{display:flex;gap:8px;justify-content:center;margin-bottom:28px;}
.ob-dot{width:10px;height:10px;border-radius:50%;transition:all 0.3s;}
.ob-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;max-width:280px;padding:16px 24px;border:none;border-radius:50px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;cursor:pointer;box-shadow:0 6px 24px rgba(0,0,0,0.25);transition:all 0.2s;margin:0 auto;}
.ob-btn:active{transform:scale(0.97);}
.ob-arrow{font-size:22px;animation:arrowPulse 1s ease-in-out infinite;}
@keyframes arrowPulse{0%,100%{transform:translateX(0);}50%{transform:translateX(6px);}}

</head>

// ── ONBOARDING ────────────────────────────────────────────────
function createParticles(containerId,color,count=15){
  const c=document.getElementById(containerId);if(!c)return;
  const emojis=['💰','🌾','📈','🏆','💎','⭐','🔥','🌟'];
  for(let i=0;i<count;i++){
    const p=document.createElement('div');p.className='ob-particle';
    if(Math.random()>0.7){
      p.style.cssText=`left:${Math.random()*100}%;bottom:-20px;font-size:18px;animation-duration:${4+Math.random()*5}s;animation-delay:${Math.random()*4}s;background:transparent;width:auto;height:auto;`;
      p.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    } else {
      p.style.cssText=`left:${Math.random()*100}%;bottom:-20px;background:${color};width:${4+Math.random()*8}px;height:${4+Math.random()*8}px;opacity:${0.3+Math.random()*0.5};animation-duration:${3+Math.random()*5}s;animation-delay:${Math.random()*4}s;border-radius:50%;`;
    }
    c.appendChild(p);
  }
}

function switchTab(tab){
  ['login','register'].forEach(t=>{document.getElementById('tab-'+t).classList.toggle('active',t===tab);});
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&tab==='login')||(i===1&&tab==='register')));
  hideError('login');hideError('reg');
}
function toast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';setTimeout(()=>t.classList.remove('show'),3500);}
function showError(prefix,msg){document.getElementById(prefix+'-error-msg').textContent=msg;document.getElementById(prefix+'-error').classList.add('show');}
function hideError(prefix){document.getElementById(prefix+'-error')?.classList.remove('show');}
function setBtn(id,loading,txt){const b=document.getElementById(id);b.disabled=loading;b.innerHTML=loading?'<span class="spinner"></span>Chargement...':txt;}
function translateError(msg){
  if(!msg)return 'Une erreur est survenue';
  if(msg.includes('Invalid login credentials'))return 'Email ou mot de passe incorrect';
  if(msg.includes('Email not confirmed'))return 'Confirmez votre email avant de vous connecter';
  if(msg.includes('already registered')||msg.includes('already been registered'))return 'Cet email est déjà utilisé';
  if(msg.includes('Password should be'))return 'Mot de passe trop court (minimum 6 caractères)';
  if(msg.includes('network')||msg.includes('Failed to fetch'))return 'Erreur réseau — vérifiez votre connexion';
  if(msg.includes('rate limit'))return 'Trop de tentatives. Attendez quelques minutes.';
  return msg;
}

async function login(){
  hideError('login');
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-password').value;
  if(!email)return showError('login','Entrez votre adresse email');
  if(!pass)return showError('login','Entrez votre mot de passe');
  if(!/\S+@\S+\.\S+/.test(email))return showError('login','Email invalide');
  setBtn('btn-login',true,'Se connecter');
  try{
    const {data,error}=await sb.auth.signInWithPassword({email,password:pass});
    if(error){showError('login',translateError(error.message));}
    else{
      toast('Connexion réussie ! Bienvenue 🎉','success');
      try{await sb.rpc('update_streak',{p_user_id:data.user.id});}catch(e){}
      setTimeout(()=>window.location.href='dashboard.html',900);
    }
  }catch(e){showError('login','Erreur réseau — vérifiez votre connexion internet');}
  setBtn('btn-login',false,'Se connecter');
}

async function register(){
  hideError('reg');
  const name=document.getElementById('reg-name').value.trim();
  const username=document.getElementById('reg-username').value.trim().toLowerCase().replace(/\s+/g,'_');
  const email=document.getElementById('reg-email').value.trim();
  const phone=document.getElementById('reg-phone').value.trim();
  const country=document.getElementById('reg-country').value;
  const pass=document.getElementById('reg-password').value;
  const ref=document.getElementById('reg-ref').value.trim().toUpperCase();
  if(!name)return showError('reg','Entrez votre nom complet');
  if(!username||username.length<3)return showError('reg','Pseudo minimum 3 caractères');
  if(!/^[a-z0-9_]+$/.test(username))return showError('reg','Pseudo : lettres, chiffres et _ uniquement');
  if(!email||!/\S+@\S+\.\S+/.test(email))return showError('reg','Email invalide');
  if(!phone)return showError('reg','Entrez votre numéro de téléphone');
  if(!pass||pass.length<8)return showError('reg','Mot de passe minimum 8 caractères');
  setBtn('btn-register',true,'🌱 Créer mon compte');
  try{
    const {data:exist}=await sb.from('profiles').select('id').eq('username',username).maybeSingle();
    if(exist){setBtn('btn-register',false,'🌱 Créer mon compte');return showError('reg','Ce pseudo est déjà pris');}
    const {data,error}=await sb.auth.signUp({
      email,password:pass,
      options:{data:{full_name:name,username,phone,country,ref:ref||null}}
    });
    if(error){showError('reg',translateError(error.message));}
    else if(data?.user?.identities?.length===0){showError('reg','Cet email est déjà utilisé');}
    else{toast('Compte créé ! Bienvenue sur AIN 🌾','gold');setTimeout(()=>window.location.href='dashboard.html',1200);}
  }catch(e){showError('reg','Erreur réseau — vérifiez votre connexion internet');}
  setBtn('btn-register',false,'🌱 Créer mon compte');
}

async function forgotPassword(){
  const email=document.getElementById('login-email').value.trim();
  if(!email)return showError('login','Entrez votre email d\'abord');
  try{
    const {error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:window.location.origin+'/profil.html'});
    if(error)showError('login',translateError(error.message));
    else toast('Email de réinitialisation envoyé ✉️','success');
  }catch(e){showError('login','Erreur réseau');}
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter'){if(document.getElementById('tab-login').classList.contains('active'))login();else register();}
});
