<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AIN — Support</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="ain_theme.css">
<script src="darkmode.js"></script>
<style>
:root{
  --navy:#0D1B4B;--navy2:#1a237e;
  --gold:#F59E0B;--gold2:#FBBF24;--gold-l:#FEF3C7;
  --bg:#EEF2FF;--card:#fff;--border:#C7D2FE;
  --text:#0D1B4B;--text2:#5C6BC0;
  --accent:#10B981;--accent-l:#ECFDF5;--danger:#EF4444;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);}
body{font-family:'Nunito',sans-serif;color:var(--text);max-width:430px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;}

.topbar{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:64px;background:linear-gradient(135deg,var(--navy),var(--navy2));display:flex;align-items:center;gap:12px;padding:0 16px;z-index:999;box-shadow:0 3px 16px rgba(13,27,75,0.35);}
.back-btn{width:38px;height:38px;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.25);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;text-decoration:none;color:#fff;flex-shrink:0;}
.top-info{flex:1;}
.top-title{font-size:15px;font-weight:900;color:#fff;}
.top-status{font-size:11px;color:rgba(255,255,255,0.70);font-weight:700;display:flex;align-items:center;gap:4px;}
.status-dot{width:7px;height:7px;border-radius:50%;background:#6EE7B7;}

/* CHAT */
.chat-wrap{flex:1;padding:72px 0 80px;overflow-y:auto;}
.chat-inner{padding:12px 14px;display:flex;flex-direction:column;gap:10px;}

/* MESSAGES */
.msg{display:flex;gap:8px;align-items:flex-end;max-width:85%;}
.msg.bot{align-self:flex-start;}
.msg.user{align-self:flex-end;flex-direction:row-reverse;}
.msg-ava{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--navy),var(--navy2));display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
.msg-bubble{padding:10px 13px;border-radius:16px;font-size:13px;font-weight:600;line-height:1.55;}
.msg.bot .msg-bubble{background:var(--card);border:1.5px solid var(--border);border-bottom-left-radius:4px;color:var(--text);}
.msg.user .msg-bubble{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;border-bottom-right-radius:4px;}
.msg-time{font-size:9px;color:var(--text2);font-weight:600;margin:0 4px 2px;text-align:center;}

/* QUICK REPLIES */
.quick-replies{display:flex;flex-wrap:wrap;gap:6px;padding:8px 14px;}
.qr-btn{padding:7px 13px;background:var(--card);border:1.5px solid var(--border);border-radius:50px;font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;color:var(--navy2);cursor:pointer;transition:all 0.2s;}
.qr-btn:active{background:var(--navy2);color:#fff;}

/* TYPING INDICATOR */
.typing{display:flex;gap:4px;align-items:center;padding:10px 13px;background:var(--card);border:1.5px solid var(--border);border-radius:16px;border-bottom-left-radius:4px;width:fit-content;}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--text2);animation:bounce 1.2s infinite;}
.typing span:nth-child(2){animation-delay:0.2s;}
.typing span:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,60%,100%{transform:translateY(0);}30%{transform:translateY(-6px);}}

/* DATE SEPARATOR */
.date-sep{text-align:center;font-size:11px;font-weight:700;color:var(--text2);padding:4px 0;}

/* INPUT */
.chat-input-wrap{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--card);border-top:1.5px solid var(--border);padding:10px 14px;display:flex;gap:8px;align-items:flex-end;z-index:999;}
.chat-input{flex:1;padding:11px 14px;border:2px solid var(--border);border-radius:22px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;color:var(--text);background:var(--bg);outline:none;resize:none;max-height:100px;transition:border-color 0.2s;line-height:1.4;}
.chat-input:focus{border-color:var(--navy2);}
.send-btn{width:44px;height:44px;background:linear-gradient(135deg,var(--navy),var(--navy2));border:none;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;box-shadow:0 3px 10px rgba(13,27,75,0.30);}
.send-btn:active{transform:scale(0.93);}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--navy);color:#fff;padding:10px 20px;border-radius:50px;font-size:12px;font-weight:700;z-index:9999;transition:transform 0.3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{background:var(--accent);}
</style>
</head>
<body>

<div class="topbar">
  <a href="dashboard.html" class="back-btn">←</a>
  <div class="top-info">
    <div class="top-title">💬 Support AIN</div>
    <div class="top-status"><span class="status-dot"></span> En ligne — répond en moins d'1h</div>
  </div>
</div>

<div class="chat-wrap" id="chat-wrap">
  <div class="chat-inner" id="chat-inner">
    <div class="date-sep">Aujourd'hui</div>
  </div>
</div>

<!-- QUICK REPLIES -->
<div class="quick-replies" id="quick-replies"></div>

<!-- INPUT -->
<div class="chat-input-wrap">
  <textarea class="chat-input" id="chat-input" placeholder="Tapez votre message..." rows="1"
    oninput="autoResize(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg();}"></textarea>
  <button class="send-btn" onclick="sendMsg()">
    <svg width="18" height="18" fill="none" viewBox="0 0 24 24"><path d="M22 2L11 13" stroke="#fff" stroke-width="2.5" stroke-linecap="round"/><path d="M22 2L15 22L11 13L2 9L22 2Z" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
  </button>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SURL='https://sklgosatithpymqufvxg.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrbGdvc2F0aXRocHltcXVmdnhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTY2MzMsImV4cCI6MjA5MjM3MjYzM30.xHidvZsJW7fzYD_ktsYfov7TpV09YsJJKn2EgX8VHSg';
const sb = supabase.createClient(SURL, SKEY);

let uid = null, userName = '', ticketId = null;
let awaitingInput = null;

// Réponses automatiques du bot
const BOT_RESPONSES = {
  'recharge': {
    text: 'Pour recharger votre compte :\n\n1️⃣ Allez dans **Recharge** depuis le dashboard\n2️⃣ Choisissez votre méthode (LeekPay, Crypto, Mobile Money)\n3️⃣ Suivez les instructions\n\nVotre solde sera crédité sous 1h maximum. Avez-vous un problème spécifique ?',
    qr: ['Paiement non reçu', 'Quelle méthode choisir', 'Autre question']
  },
  'retrait': {
    text: 'Pour retirer vos gains :\n\n1️⃣ Allez dans **Retrait** depuis le dashboard\n2️⃣ Entrez le montant (minimum $2)\n3️⃣ Vérifiez votre numéro et confirmez\n\n⏱️ Normal : 24-48h\n⚡ Express : 1-2h (frais 5%)\n\nVotre retrait est-il déjà en cours ?',
    qr: ['Retrait en attente', 'Mauvais numéro entré', 'Autre question']
  },
  'taches': {
    text: '✅ Pour vos tâches :\n\nVos tâches se renouvellent chaque jour à **minuit**. Si vous ne voyez pas vos tâches :\n\n• Vérifiez que votre plan VIP est actif\n• Rafraîchissez la page\n• Vérifiez que vous n\'avez pas déjà tout complété aujourd\'hui\n\nQuel est votre problème exact ?',
    qr: ['Tâches non disponibles', 'Gain non crédité', 'Autre question']
  },
  'vip': {
    text: '👑 Plans VIP :\n\nPour activer un plan VIP :\n1️⃣ Rechargez d\'abord votre compte\n2️⃣ Allez dans **VIP** depuis le dashboard\n3️⃣ Choisissez votre plan et confirmez\n\nLe plan s\'active immédiatement après paiement. Besoin d\'aide pour choisir ?',
    qr: ['Quel plan choisir', 'VIP non activé', 'Autre question']
  },
  'compte': {
    text: '👤 Problème de compte :\n\nJe vais vous aider. Pouvez-vous me préciser votre problème ?\n\n• Connexion impossible\n• Mot de passe oublié\n• Compte bloqué\n• Autre',
    qr: ['Connexion impossible', 'Mot de passe oublié', 'Compte bloqué', 'Autre']
  },
  'default': {
    text: 'Je comprends votre demande. Un agent de notre équipe va vous répondre très prochainement.\n\n⏱️ Temps de réponse habituel : **moins d\'1 heure**\n\nEn attendant, avez-vous consulté notre tutoriel ?',
    qr: ['Voir le tutoriel', 'Contacter WhatsApp', 'Envoyer ticket']
  }
};

function toast(m, t='info') {
  const el = document.getElementById('toast');
  el.textContent = m;
  el.className = 'toast ' + t + ' show';
  setTimeout(() => el.classList.remove('show'), 3000);
}

function now() {
  return new Date().toLocaleTimeString('fr-FR', {hour:'2-digit', minute:'2-digit'});
}

function addMsg(text, isBot, showTime=true) {
  const wrap = document.getElementById('chat-inner');
  
  // Formatter le texte (gras avec **)
  const formatted = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>').replace(/\n/g, '<br>');
  
  const msg = document.createElement('div');
  msg.className = 'msg ' + (isBot ? 'bot' : 'user');
  msg.innerHTML = isBot
    ? `<div class="msg-ava">🌾</div><div class="msg-bubble">${formatted}</div>`
    : `<div class="msg-bubble">${formatted}</div>`;
  wrap.appendChild(msg);
  
  if(showTime) {
    const t = document.createElement('div');
    t.className = 'msg-time';
    t.textContent = now();
    wrap.appendChild(t);
  }
  
  scroll();
}

function showTyping() {
  const wrap = document.getElementById('chat-inner');
  const typing = document.createElement('div');
  typing.className = 'msg bot';
  typing.id = 'typing-indicator';
  typing.innerHTML = `<div class="msg-ava">🌾</div><div class="typing"><span></span><span></span><span></span></div>`;
  wrap.appendChild(typing);
  scroll();
}

function hideTyping() {
  const t = document.getElementById('typing-indicator');
  if(t) t.remove();
}

function scroll() {
  const wrap = document.getElementById('chat-wrap');
  wrap.scrollTop = wrap.scrollHeight;
}

function setQuickReplies(options) {
  const qr = document.getElementById('quick-replies');
  qr.innerHTML = '';
  if(!options) return;
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = opt;
    btn.onclick = () => handleQuickReply(opt);
    qr.appendChild(btn);
  });
}

function handleQuickReply(text) {
  setQuickReplies(null);
  addMsg(text, false);
  processUserMsg(text);
}

function processUserMsg(text) {
  const lower = text.toLowerCase();
  let response = BOT_RESPONSES.default;
  
  if(lower.includes('recharge') || lower.includes('dépôt') || lower.includes('paiement')) response = BOT_RESPONSES.recharge;
  else if(lower.includes('retrait') || lower.includes('retirer') || lower.includes('withdraw')) response = BOT_RESPONSES.retrait;
  else if(lower.includes('tâche') || lower.includes('tache') || lower.includes('task')) response = BOT_RESPONSES.taches;
  else if(lower.includes('vip') || lower.includes('plan') || lower.includes('abonnement')) response = BOT_RESPONSES.vip;
  else if(lower.includes('compte') || lower.includes('connexion') || lower.includes('mot de passe')) response = BOT_RESPONSES.compte;
  else if(lower.includes('tutoriel') || lower.includes('guide')) {
    window.location.href = 'tutoriel.html'; return;
  } else if(lower.includes('whatsapp')) {
    window.open('https://wa.me/22890000000?text=Bonjour, j\'ai besoin d\'aide sur AIN', '_blank');
    return;
  } else if(lower.includes('ticket')) {
    saveTicket(text); return;
  }
  
  showTyping();
  setTimeout(() => {
    hideTyping();
    addMsg(response.text, true);
    setQuickReplies(response.qr);
    // Sauvegarder en base
    saveMessage(text, false);
    saveMessage(response.text, true);
  }, 1200 + Math.random() * 800);
}

async function saveMessage(text, isBot) {
  if(!uid) return;
  await sb.from('support_messages').insert({
    user_id: uid,
    ticket_id: ticketId,
    message: text,
    is_bot: isBot,
    sender: isBot ? 'bot' : 'user'
  }).catch(() => {});
}

async function saveTicket(msg) {
  if(!uid) return;
  const {data} = await sb.from('support_tickets').insert({
    user_id: uid,
    subject: msg.slice(0, 80),
    status: 'open'
  }).select().single().catch(() => ({data: null}));
  
  if(data) ticketId = data.id;
  showTyping();
  setTimeout(() => {
    hideTyping();
    addMsg('✅ Votre ticket a été créé ! Un agent va vous répondre sous 1h.\n\nTicket #' + (ticketId || '—'), true);
    setQuickReplies(['Ok merci', 'Autre question']);
  }, 1000);
}

async function sendMsg() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if(!text) return;
  
  input.value = '';
  input.style.height = 'auto';
  setQuickReplies(null);
  addMsg(text, false);
  processUserMsg(text);
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

// Messages d'accueil
async function init() {
  const {data:{session}} = await sb.auth.getSession();
  if(!session) { window.location.href = 'index.html'; return; }
  uid = session.user.id;
  
  const {data: p} = await sb.from('profiles').select('full_name').eq('id', uid).single();
  userName = p?.full_name?.split(' ')[0] || 'vous';
  
  // Message de bienvenue
  setTimeout(() => {
    addMsg(`Bonjour ${userName} 👋 Bienvenue sur le support AIN !\n\nComment puis-je vous aider aujourd'hui ?`, true);
    setQuickReplies(['Problème recharge', 'Problème retrait', 'Problème tâches', 'Problème VIP', 'Problème compte', 'Autre']);
  }, 500);
}

init();
</script>
<script src="security.js"></script>
</body>
</html>
