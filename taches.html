<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AIN — Tâches du jour</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--navy:#0D1B4B;--navy2:#1a237e;--navy3:#1565C0;--gold:#F59E0B;--gold2:#FBBF24;--gold-l:#FEF3C7;--bg:#EEF2FF;--card:#fff;--border:#C7D2FE;--text:#0D1B4B;--text2:#5C6BC0;--accent:#10B981;--accent-l:#ECFDF5;--danger:#EF4444;--topbar:64px;--botnav:68px;--radius:16px;}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--text);max-width:430px;margin:0 auto;}
.topbar{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:var(--topbar);background:linear-gradient(135deg,var(--navy),var(--navy2));display:flex;align-items:center;padding:0 16px;z-index:100;box-shadow:0 3px 20px rgba(13,27,75,0.40);gap:12px;}
.back{width:38px;height:38px;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.25);border-radius:50%;display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;font-size:18px;color:#fff;flex-shrink:0;}
.topbar h1{font-size:17px;font-weight:900;color:#fff;flex:1;}
.topbar-right{margin-left:auto;}
.boost-chip{background:var(--gold);color:var(--navy);border-radius:50px;padding:5px 12px;font-size:12px;font-weight:900;text-decoration:none;display:inline-block;}
.main{padding:calc(var(--topbar)+14px) 12px calc(var(--botnav)+20px);}

/* Stats banner */
.stats-banner{background:linear-gradient(135deg,var(--navy),var(--navy2));border-radius:18px;padding:16px;color:#fff;margin-bottom:14px;display:grid;grid-template-columns:repeat(3,1fr);gap:10px;box-shadow:0 6px 24px rgba(13,27,75,0.25);}
.sb-item{text-align:center;}
.sb-val{font-size:20px;font-weight:900;}
.sb-lbl{font-size:11px;opacity:0.75;font-weight:600;margin-top:2px;}

/* VIP info */
.vip-row{background:var(--gold-l);border:1.5px solid rgba(245,158,11,0.30);border-radius:14px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;}
.vr-left{font-size:13px;font-weight:800;color:var(--navy2);}
.vr-sub{font-size:11px;color:var(--text2);font-weight:600;margin-top:3px;}
.vr-right{font-size:16px;font-weight:900;color:var(--gold);}

/* Boost actif */
.boost-active{background:linear-gradient(135deg,var(--gold),#F97316);border-radius:14px;padding:12px 14px;margin-bottom:14px;display:flex;align-items:center;gap:10px;color:#fff;}
.ba-ico{font-size:26px;}
.ba-txt{font-size:13px;font-weight:900;}
.ba-sub{font-size:11px;opacity:0.85;font-weight:600;}
.ba-mult{margin-left:auto;font-size:22px;font-weight:900;}

/* Progress */
.prog-card{background:var(--card);border-radius:var(--radius);padding:14px;margin-bottom:14px;border:1px solid var(--border);box-shadow:0 2px 10px rgba(13,27,75,0.06);}
.pc-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
.pc-title{font-size:14px;font-weight:800;color:var(--text);}
.pc-badge{background:linear-gradient(135deg,var(--navy2),var(--navy3));color:#fff;border-radius:50px;padding:3px 12px;font-size:13px;font-weight:800;}
.pc-bar{height:10px;background:var(--bg);border-radius:50px;overflow:hidden;}
.pc-fill{height:100%;background:linear-gradient(90deg,var(--gold),var(--gold2));border-radius:50px;transition:width 0.5s ease;}
.pc-info{display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:var(--text2);font-weight:600;}
.pc-earn{color:var(--accent);font-weight:800;}

/* Tâche card */
.task-card{background:var(--card);border-radius:var(--radius);margin-bottom:12px;border:2px solid var(--border);overflow:hidden;box-shadow:0 2px 12px rgba(13,27,75,0.06);transition:all 0.2s;}
.task-card.done{border-color:var(--accent);opacity:0.75;}
.task-img{width:100%;height:160px;object-fit:cover;background:var(--bg);display:block;}
.task-img-placeholder{width:100%;height:160px;background:linear-gradient(135deg,var(--navy),var(--navy2));display:flex;align-items:center;justify-content:center;font-size:56px;}
.task-body{padding:14px;}
.task-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
.task-title{font-size:15px;font-weight:900;color:var(--text);line-height:1.3;flex:1;}
.task-reward{background:var(--gold-l);color:var(--gold);border:1px solid rgba(245,158,11,0.25);border-radius:50px;padding:4px 10px;font-size:12px;font-weight:900;white-space:nowrap;margin-left:8px;flex-shrink:0;}
.task-desc{font-size:13px;color:var(--text2);font-weight:600;margin-bottom:12px;line-height:1.5;}
.task-foot{display:flex;align-items:center;gap:8px;}
.task-vip{font-size:11px;color:var(--text2);font-weight:700;flex:1;}
.btn-task{padding:10px 20px;background:linear-gradient(135deg,var(--navy2),var(--navy3));color:#fff;border:none;border-radius:10px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.btn-task:hover{transform:translateY(-1px);}
.btn-task.done{background:var(--accent);cursor:default;}
.btn-task.locked{background:var(--border);color:var(--text2);cursor:not-allowed;}

/* All done */
.all-done{text-align:center;padding:40px 20px;background:var(--card);border-radius:var(--radius);border:2px solid var(--gold);}
.ad-ico{font-size:64px;margin-bottom:12px;}
.ad-title{font-size:22px;font-weight:900;color:var(--gold);margin-bottom:8px;}
.ad-sub{font-size:14px;color:var(--text2);font-weight:600;}
.ad-amount{font-size:28px;font-weight:900;color:var(--navy2);margin-top:12px;}

/* Modal */
.moverlay{position:fixed;inset:0;background:rgba(13,27,75,0.55);z-index:200;display:none;align-items:flex-end;}
.moverlay.open{display:flex;}
.msheet{background:var(--card);border-radius:22px 22px 0 0;width:100%;max-width:430px;margin:0 auto;padding:0 0 36px;animation:su 0.3s ease;}
.mhandle{width:40px;height:4px;background:var(--border);border-radius:50px;margin:14px auto 0;}
.mimg{width:100%;height:200px;object-fit:cover;}
.mimg-ph{width:100%;height:200px;background:linear-gradient(135deg,var(--navy),var(--navy2));display:flex;align-items:center;justify-content:center;font-size:72px;}
.mcontent{padding:16px 20px;}
.mcontent h3{font-size:18px;font-weight:900;color:var(--navy);margin-bottom:8px;}
.mcontent p{font-size:13px;color:var(--text2);font-weight:600;line-height:1.6;margin-bottom:14px;}
.mreward{background:var(--gold-l);border:1.5px solid rgba(245,158,11,0.30);border-radius:14px;padding:14px;text-align:center;margin-bottom:16px;}
.mr-val{font-size:30px;font-weight:900;color:var(--gold);}
.mr-lbl{font-size:12px;color:var(--gold);font-weight:700;margin-top:2px;}
.btn-confirm{width:100%;padding:14px;background:linear-gradient(135deg,var(--accent),#059669);color:#fff;border:none;border-radius:12px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;cursor:pointer;transition:all 0.2s;}
.btn-cancel{width:100%;padding:12px;background:transparent;color:var(--text2);border:none;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;}

.botnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:var(--card);border-top:2px solid var(--border);display:flex;height:var(--botnav);z-index:100;box-shadow:0 -3px 16px rgba(13,27,75,0.10);}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;text-decoration:none;color:var(--text2);font-size:11px;font-weight:700;}
.ni.on{color:var(--navy2);}
.ni .nico{font-size:22px;}
.toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--text);color:#fff;padding:11px 22px;border-radius:50px;font-size:13px;font-weight:700;white-space:nowrap;z-index:9999;transition:transform 0.3s ease;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{background:var(--accent);}
.toast.error{background:var(--danger);}
.toast.gold{background:var(--gold);color:var(--navy);}
.spinner{display:inline-block;width:15px;height:15px;border:2px solid rgba(255,255,255,0.4);border-top-color:#fff;border-radius:50%;animation:spin 0.7s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes su{from{transform:translateY(100%)}to{transform:translateY(0)}}
</style>
</head>
<body>
<div class="topbar">
  <button class="back" onclick="history.back()">←</button>
  <h1>🌾 Tâches du jour</h1>
  <a href="challenges.html" class="boost-chip">⚡ Boosts</a>
</div>

<div class="main">
  <div class="stats-banner">
    <div class="sb-item"><div class="sb-val" id="s-done">0</div><div class="sb-lbl">Complétées</div></div>
    <div class="sb-item"><div class="sb-val" id="s-rem">—</div><div class="sb-lbl">Restantes</div></div>
    <div class="sb-item"><div class="sb-val" id="s-earn">0F</div><div class="sb-lbl">Gagné auj.</div></div>
  </div>

  <div class="vip-row">
    <div>
      <div class="vr-left" id="vip-txt">⭐ VIP 0 — Starter</div>
      <div class="vr-sub" id="vip-sub">5 tâches/jour • 100 FCFA/tâche</div>
    </div>
    <div class="vr-right" id="vip-max">500 FCFA/j</div>
  </div>

  <div id="boost-banner" style="display:none" class="boost-active">
    <span class="ba-ico">⚡</span>
    <div><div class="ba-txt">Boost actif !</div><div class="ba-sub" id="boost-sub">—</div></div>
    <div class="ba-mult" id="boost-mult">x2</div>
  </div>

  <div class="prog-card">
    <div class="pc-top">
      <span class="pc-title">Progression du jour</span>
      <span class="pc-badge" id="prog-badge">0 / 0</span>
    </div>
    <div class="pc-bar"><div class="pc-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="pc-info">
      <span id="prog-left">Chargement...</span>
      <span class="pc-earn" id="prog-pot">+0 FCFA</span>
    </div>
  </div>

  <div id="tasks-list"><div style="text-align:center;padding:40px;color:var(--text2);">Chargement des tâches...</div></div>
</div>

<div class="botnav">
  <a href="dashboard.html" class="ni"><span class="nico">🏠</span>Accueil</a>
  <a href="taches.html" class="ni on"><span class="nico">✅</span>Tâches</a>
  <a href="rapport.html" class="ni"><span class="nico">📊</span>Rapports</a>
  <a href="profil.html" class="ni"><span class="nico">👤</span>Mon Compte</a>
</div>

<!-- Modal confirmation -->
<div class="moverlay" id="tmod" onclick="closeMod(event)">
  <div class="msheet" id="msheet">
    <div class="mhandle"></div>
    <div id="mimg-wrap"></div>
    <div class="mcontent">
      <h3 id="m-title">—</h3>
      <p id="m-desc">—</p>
      <div class="mreward"><div class="mr-val" id="m-reward">+0 FCFA</div><div class="mr-lbl">Récompense de la tâche</div></div>
      <button class="btn-confirm" id="btn-confirm" onclick="confirmTask()">✅ Valider la tâche</button>
      <button class="btn-cancel" onclick="closeMod()">Annuler</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SURL='https://sklgosatithpymqufvxg.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrbGdvc2F0aXRocHltcXVmdnhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTY2MzMsImV4cCI6MjA5MjM3MjYzM30.xHidvZsJW7fzYD_ktsYfov7TpV09YsJJKn2EgX8VHSg';
const sb=supabase.createClient(SURL,SKEY);
const VIP_T=[5,8,10,12,15,18,20,22,25,30];
const VIP_R=[100,250,500,900,1500,2500,4500,8000,15000,30000];
const VIP_N=['Starter','Bronze','Argent','Or','Platine','Diamant','Émeraude','Rubis','Saphir','Légendaire'];
let uid=null,prof=null,tasks=[],doneIds=new Set(),boost=1,pendingId=null,pendingReward=0;
function fmt(n){return Number(n||0).toLocaleString('fr-FR');}
function toast(msg,type='info'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';setTimeout(()=>t.classList.remove('show'),3200);}

async function init(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='index.html';return;}
  uid=session.user.id;
  await loadProfile();
  await loadBoost();
  await loadTasks();
}

async function loadProfile(){
  const {data}=await sb.from('profiles').select('*').eq('id',uid).single();
  if(!data)return; prof=data;
  const lvl=data.vip_level||0,tot=VIP_T[lvl],done=data.tasks_done_today||0,rem=Math.max(0,tot-done);
  document.getElementById('vip-txt').textContent='⭐ VIP '+lvl+' — '+VIP_N[lvl];
  document.getElementById('vip-sub').textContent=tot+' tâches/jour • '+fmt(VIP_R[lvl])+' FCFA/tâche';
  document.getElementById('vip-max').textContent=fmt(VIP_R[lvl]*tot)+' FCFA/j';
  document.getElementById('s-done').textContent=done;
  document.getElementById('s-rem').textContent=rem;
  document.getElementById('prog-badge').textContent=done+' / '+tot;
  document.getElementById('prog-fill').style.width=(tot>0?done/tot*100:0)+'%';
  document.getElementById('prog-left').textContent=rem>0?rem+' tâche(s) à compléter':'✅ Journée complète !';
  document.getElementById('prog-pot').textContent='+'+fmt(rem*VIP_R[lvl])+' FCFA';
  const today=new Date().toISOString().split('T')[0];
  const {data:tt}=await sb.from('transactions').select('amount').eq('user_id',uid).eq('type','gain_tache').gte('created_at',today);
  document.getElementById('s-earn').textContent=fmt((tt||[]).reduce((s,x)=>s+parseFloat(x.amount||0),0))+'F';
}

async function loadBoost(){
  const {data}=await sb.from('boosts_actifs').select('*').eq('user_id',uid).eq('is_active',true).gt('ends_at',new Date().toISOString()).maybeSingle();
  if(!data)return;
  boost=data.multiplier;
  const mins=Math.max(0,Math.ceil((new Date(data.ends_at)-Date.now())/60000));
  document.getElementById('boost-banner').style.display='flex';
  document.getElementById('boost-mult').textContent='x'+data.multiplier;
  document.getElementById('boost-sub').textContent='Expire dans '+Math.floor(mins/60)+'h '+mins%60+'min';
}

async function loadTasks(){
  const lvl=prof?.vip_level||0;
  const today=new Date().toISOString().split('T')[0];
  const {data:all}=await sb.from('taches_custom').select('*').eq('is_active',true).lte('vip_min',lvl).order('ordre');
  const {data:done}=await sb.from('taches_completees').select('tache_id').eq('user_id',uid).gte('completed_at',today+'T00:00:00');
  doneIds=new Set((done||[]).map(x=>x.tache_id));
  tasks=all||[];
  const maxT=VIP_T[lvl],doneC=prof?.tasks_done_today||0;

  if(!tasks.length){
    document.getElementById('tasks-list').innerHTML=`<div style="text-align:center;padding:40px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);"><div style="font-size:48px;margin-bottom:12px;">🌾</div><p style="font-weight:700;color:var(--text2);">Aucune tâche disponible pour votre niveau VIP.</p><a href="vip.html" style="color:var(--navy2);font-weight:800;font-size:14px;">Upgrader mon plan →</a></div>`;
    return;
  }

  if(doneC>=maxT){
    const earned=(prof?.tasks_done_today||0)*VIP_R[lvl];
    document.getElementById('tasks-list').innerHTML=`<div class="all-done"><div class="ad-ico">🎉</div><div class="ad-title">Excellent travail !</div><div class="ad-sub">Toutes vos tâches du jour sont complétées.<br>Revenez demain pour de nouveaux gains !</div><div class="ad-amount">+${fmt(earned)} FCFA gagnés 🌾</div></div>`;
    return;
  }

  document.getElementById('tasks-list').innerHTML=tasks.slice(0,maxT).map((t,i)=>{
    const isDone=doneIds.has(t.id)||(i<doneC);
    const r=Math.round((t.reward_override||VIP_R[lvl])*boost);
    return`<div class="task-card ${isDone?'done':''}">
      ${t.image_url?`<img class="task-img" src="${t.image_url}" alt="${t.title}" onerror="this.style.display='none'">`:
        `<div class="task-img-placeholder">🌾</div>`}
      <div class="task-body">
        <div class="task-head">
          <span class="task-title">${t.title}</span>
          <span class="task-reward">${isDone?'✅ Fait':'+'+fmt(r)+' F'}</span>
        </div>
        <p class="task-desc">${t.description||'Regardez attentivement et validez cette tâche pour gagner votre récompense.'}</p>
        <div class="task-foot">
          <span class="task-vip">VIP ${t.vip_min}+</span>
          ${isDone?`<button class="btn-task done" disabled>✅ Complétée</button>`:
            `<button class="btn-task" onclick="openTask('${t.id}','${t.title.replace(/'/g,"\\'")}','${(t.description||'').replace(/'/g,"\\'")}','${t.image_url||''}',${r})">Valider →</button>`}
        </div>
      </div>
    </div>`;
  }).join('');
}

function openTask(id,title,desc,img,reward){
  const maxT=VIP_T[prof?.vip_level||0];
  if((prof?.tasks_done_today||0)>=maxT)return toast('Toutes les tâches du jour sont complétées !','error');
  if(doneIds.has(id))return toast('Tâche déjà complétée','error');
  pendingId=id; pendingReward=reward;
  document.getElementById('m-title').textContent=title;
  document.getElementById('m-desc').textContent=desc||'Validez cette tâche pour gagner votre récompense.';
  document.getElementById('m-reward').textContent='+'+fmt(reward)+' FCFA';
  document.getElementById('mimg-wrap').innerHTML=img?`<img class="mimg" src="${img}" onerror="this.style.display='none'">`:
    `<div class="mimg-ph">🌾</div>`;
  document.getElementById('tmod').classList.add('open');
}

function closeMod(e){if(!e||e.target.id==='tmod')document.getElementById('tmod').classList.remove('open');}

async function confirmTask(){
  if(!pendingId)return;
  const btn=document.getElementById('btn-confirm');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span>Validation...';
  const today=new Date().toISOString().split('T')[0];
  const {data:ex}=await sb.from('taches_completees').select('id').eq('user_id',uid).eq('tache_id',pendingId).gte('completed_at',today+'T00:00:00').maybeSingle();
  if(ex){toast('Tâche déjà complétée aujourd\'hui','error');btn.disabled=false;btn.innerHTML='✅ Valider la tâche';closeMod();return;}
  const {error}=await sb.from('taches_completees').insert({user_id:uid,tache_id:pendingId,gain:pendingReward});
  if(error){toast(error.message,'error');btn.disabled=false;btn.innerHTML='✅ Valider la tâche';return;}
  doneIds.add(pendingId);
  prof.tasks_done_today=(prof.tasks_done_today||0)+1;
  prof.balance=(prof.balance||0)+pendingReward;
  prof.total_earned=(prof.total_earned||0)+pendingReward;
  toast('+'+fmt(pendingReward)+' FCFA crédités ! 🎉','gold');
  closeMod();
  btn.disabled=false; btn.innerHTML='✅ Valider la tâche';
  sb.rpc('check_and_award_badges',{p_user_id:uid}).catch(()=>{});
  await loadProfile();
  await loadTasks();
}

init();
</script>
</body>
</html>
