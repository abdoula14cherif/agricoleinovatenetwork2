<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AIN — Historique des gains</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --navy:#0D1B4B;--navy2:#1a237e;--navy3:#1565C0;
  --gold:#F59E0B;--gold2:#FBBF24;--gold-l:#FEF3C7;
  --bg:#EEF2FF;--card:#fff;--border:#C7D2FE;
  --text:#0D1B4B;--text2:#5C6BC0;
  --accent:#10B981;--accent-l:#ECFDF5;--danger:#EF4444;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{background:var(--bg);}
body{font-family:'Nunito',sans-serif;color:var(--text);max-width:430px;margin:0 auto;min-height:100vh;}

.topbar{position:fixed;top:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;height:64px;background:linear-gradient(135deg,var(--navy),var(--navy2));display:flex;align-items:center;justify-content:space-between;padding:0 16px;z-index:999;box-shadow:0 3px 16px rgba(13,27,75,0.35);}
.back-btn{width:38px;height:38px;background:rgba(255,255,255,0.15);border:1.5px solid rgba(255,255,255,0.25);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;text-decoration:none;color:#fff;flex-shrink:0;}
.top-title{font-size:16px;font-weight:900;color:#fff;}
.top-title span{color:var(--gold);}
.main{padding-top:72px;padding-bottom:30px;}

/* HERO STATS */
.hero{background:linear-gradient(135deg,var(--navy),var(--navy2));margin:12px 12px 0;border-radius:18px;padding:18px;box-shadow:0 6px 20px rgba(13,27,75,0.25);position:relative;overflow:hidden;}
.hero::after{content:'📈';position:absolute;right:-10px;bottom:-10px;font-size:90px;opacity:0.07;}
.hero-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
.hg{background:rgba(255,255,255,0.10);border:1px solid rgba(255,255,255,0.15);border-radius:13px;padding:12px;}
.hg-lbl{font-size:10px;color:rgba(255,255,255,0.65);font-weight:700;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.5px;}
.hg-val{font-size:20px;font-weight:900;color:#fff;}
.hg-val.gold{color:var(--gold2);}
.hg-val.green{color:#6EE7B7;}
.hg-sub{font-size:10px;color:rgba(255,255,255,0.55);font-weight:600;margin-top:2px;}

/* MINI CHART */
.chart-wrap{background:rgba(255,255,255,0.08);border-radius:12px;padding:12px;margin-bottom:0;}
.chart-title{font-size:11px;font-weight:800;color:rgba(255,255,255,0.70);margin-bottom:8px;}
.chart-bars{display:flex;align-items:flex-end;gap:3px;height:50px;}
.bar-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;}
.bar{width:100%;border-radius:3px 3px 0 0;background:rgba(255,255,255,0.25);transition:height 0.5s ease;min-height:3px;}
.bar.active{background:var(--gold2);}
.bar-lbl{font-size:8px;color:rgba(255,255,255,0.50);font-weight:700;}

/* FILTRES */
.filters{display:flex;gap:6px;padding:12px 12px 0;overflow-x:auto;scrollbar-width:none;}
.filters::-webkit-scrollbar{display:none;}
.filter-btn{padding:7px 14px;border-radius:50px;border:1.5px solid var(--border);background:var(--card);font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;color:var(--text2);cursor:pointer;white-space:nowrap;transition:all 0.2s;flex-shrink:0;}
.filter-btn.on{background:var(--navy2);color:#fff;border-color:var(--navy2);}

/* TYPE FILTER */
.type-filters{display:flex;gap:6px;padding:8px 12px 0;overflow-x:auto;scrollbar-width:none;}
.type-filters::-webkit-scrollbar{display:none;}
.type-btn{padding:5px 12px;border-radius:50px;border:1.5px solid var(--border);background:var(--card);font-family:'Nunito',sans-serif;font-size:11px;font-weight:800;color:var(--text2);cursor:pointer;white-space:nowrap;flex-shrink:0;}
.type-btn.on{border-color:var(--navy2);color:var(--navy2);background:#EEF2FF;}

/* RÉSUMÉ PAR TYPE */
.summary-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 12px 0;}
.sum-card{background:var(--card);border-radius:13px;padding:11px;text-align:center;border:1.5px solid var(--border);box-shadow:0 2px 8px rgba(13,27,75,0.05);}
.sum-ico{font-size:18px;margin-bottom:4px;}
.sum-val{font-size:14px;font-weight:900;color:var(--navy);}
.sum-lbl{font-size:9px;color:var(--text2);font-weight:700;margin-top:2px;}

/* LISTE */
.list-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 8px;}
.lh-title{font-size:13px;font-weight:900;color:var(--text);}
.lh-count{font-size:11px;font-weight:700;color:var(--text2);}

.tx-item{background:var(--card);margin:0 12px 8px;border-radius:14px;padding:13px 14px;border:1.5px solid var(--border);box-shadow:0 1px 6px rgba(13,27,75,0.05);display:flex;align-items:center;gap:12px;}
.tx-ico{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.tx-info{flex:1;}
.tx-desc{font-size:13px;font-weight:800;color:var(--text);}
.tx-date{font-size:10px;color:var(--text2);font-weight:600;margin-top:2px;}
.tx-tag{font-size:9px;font-weight:800;padding:2px 7px;border-radius:50px;margin-top:4px;display:inline-block;}
.tx-amt{font-size:15px;font-weight:900;text-align:right;flex-shrink:0;}
.tx-amt.plus{color:var(--accent);}
.tx-amt.minus{color:var(--danger);}

/* DATE GROUP */
.date-group{padding:10px 16px 4px;font-size:11px;font-weight:900;color:var(--text2);text-transform:uppercase;letter-spacing:0.5px;}

/* EMPTY */
.empty-state{text-align:center;padding:40px 20px;color:var(--text2);}
.es-ico{font-size:48px;margin-bottom:12px;}
.es-title{font-size:15px;font-weight:900;color:var(--navy);margin-bottom:6px;}
.es-sub{font-size:12px;font-weight:600;line-height:1.6;}

/* LOAD MORE */
.load-more{display:block;width:calc(100% - 24px);margin:8px 12px 0;padding:13px;background:var(--card);border:1.5px solid var(--border);border-radius:13px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;color:var(--navy2);cursor:pointer;text-align:center;}
.load-more:active{transform:scale(0.98);}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--navy);color:#fff;padding:10px 20px;border-radius:50px;font-size:12px;font-weight:700;z-index:9999;transition:transform 0.3s;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}
.toast.success{background:var(--accent);}
.toast.gold{background:var(--gold);color:var(--navy);}

.spinner-wrap{text-align:center;padding:30px;color:var(--text2);font-size:13px;font-weight:700;}
</style>
</head>
<body>

<div class="topbar">
  <div style="display:flex;align-items:center;gap:10px;">
    <a href="dashboard.html" class="back-btn">←</a>
    <span class="top-title">📈 Historique des <span>gains</span></span>
  </div>
  <div style="font-size:11px;font-weight:800;color:rgba(255,255,255,0.70);" id="top-period">30 derniers jours</div>
</div>

<div class="main">

  <!-- HERO STATS -->
  <div class="hero">
    <div class="hero-grid">
      <div class="hg">
        <div class="hg-lbl">💰 Total gagné</div>
        <div class="hg-val gold" id="stat-total">$0.00</div>
        <div class="hg-sub" id="stat-period">chargement...</div>
      </div>
      <div class="hg">
        <div class="hg-lbl">📅 Moyenne/jour</div>
        <div class="hg-val green" id="stat-avg">$0.00</div>
        <div class="hg-sub" id="stat-days">— jours actifs</div>
      </div>
      <div class="hg">
        <div class="hg-lbl">🏆 Meilleur jour</div>
        <div class="hg-val" id="stat-best">$0.00</div>
        <div class="hg-sub" id="stat-best-date">—</div>
      </div>
      <div class="hg">
        <div class="hg-lbl">📊 Transactions</div>
        <div class="hg-val" id="stat-count">0</div>
        <div class="hg-sub">au total</div>
      </div>
    </div>
    <!-- MINI GRAPHIQUE 7 JOURS -->
    <div class="chart-wrap">
      <div class="chart-title">📊 Gains des 7 derniers jours</div>
      <div class="chart-bars" id="chart-bars">
        <!-- Généré en JS -->
      </div>
    </div>
  </div>

  <!-- RÉSUMÉ PAR TYPE -->
  <div class="summary-row">
    <div class="sum-card">
      <div class="sum-ico">✅</div>
      <div class="sum-val" id="sum-taches">$0</div>
      <div class="sum-lbl">Tâches</div>
    </div>
    <div class="sum-card">
      <div class="sum-ico">📈</div>
      <div class="sum-val" id="sum-fonds">$0</div>
      <div class="sum-lbl">Fonds</div>
    </div>
    <div class="sum-card">
      <div class="sum-ico">🤝</div>
      <div class="sum-val" id="sum-parrain">$0</div>
      <div class="sum-lbl">Parrainage</div>
    </div>
  </div>

  <!-- FILTRES PÉRIODE -->
  <div class="filters">
    <button class="filter-btn" onclick="setPeriod(7,this)">7 jours</button>
    <button class="filter-btn on" onclick="setPeriod(30,this)">30 jours</button>
    <button class="filter-btn" onclick="setPeriod(90,this)">3 mois</button>
    <button class="filter-btn" onclick="setPeriod(365,this)">1 an</button>
    <button class="filter-btn" onclick="setPeriod(9999,this)">Tout</button>
  </div>

  <!-- FILTRES TYPE -->
  <div class="type-filters">
    <button class="type-btn on" onclick="setType('all',this)">🔄 Tout</button>
    <button class="type-btn" onclick="setType('credit',this)">✅ Gains</button>
    <button class="type-btn" onclick="setType('retrait',this)">💸 Retraits</button>
    <button class="type-btn" onclick="setType('tache',this)">📋 Tâches</button>
    <button class="type-btn" onclick="setType('fond',this)">📈 Fonds</button>
    <button class="type-btn" onclick="setType('commission',this)">🤝 Parrainage</button>
  </div>

  <!-- LISTE TRANSACTIONS -->
  <div class="list-header">
    <div class="lh-title">📋 Détail des transactions</div>
    <div class="lh-count" id="tx-count">—</div>
  </div>
  <div id="tx-list">
    <div class="spinner-wrap">⏳ Chargement...</div>
  </div>
  <button class="load-more" id="btn-more" onclick="loadMore()" style="display:none;">⬇️ Charger plus</button>

</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SURL='https://sklgosatithpymqufvxg.supabase.co';
const SKEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNrbGdvc2F0aXRocHltcXVmdnhnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3OTY2MzMsImV4cCI6MjA5MjM3MjYzM30.xHidvZsJW7fzYD_ktsYfov7TpV09YsJJKn2EgX8VHSg';
const sb=supabase.createClient(SURL,SKEY);

let uid=null, currentPeriod=30, currentType='all', allTx=[], filtered=[], offset=0;
const PAGE=20;

function fmt(n){return '$'+Number(n||0).toFixed(2);}
function toast(m,t='info'){const el=document.getElementById('toast');el.textContent=m;el.className='toast '+t+' show';setTimeout(()=>el.classList.remove('show'),3000);}

function ago(d){
  const date=new Date(d);
  return date.toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});
}
function dayStr(d){
  const date=new Date(d);
  const today=new Date();
  const yesterday=new Date(today);yesterday.setDate(today.getDate()-1);
  if(date.toDateString()===today.toDateString()) return "Aujourd'hui";
  if(date.toDateString()===yesterday.toDateString()) return 'Hier';
  return date.toLocaleDateString('fr-FR',{weekday:'long',day:'2-digit',month:'long'});
}

function getTxStyle(tx){
  const desc=(tx.description||tx.type||'').toLowerCase();
  if(desc.includes('tâche')||desc.includes('tache')||desc.includes('task'))
    return {ico:'✅',bg:'var(--accent-l)',color:'#065F46',tag:'Tâche',tagBg:'#ECFDF5',tagColor:'#065F46'};
  if(desc.includes('fond')||desc.includes('invest')||desc.includes('retour'))
    return {ico:'📈',bg:'#EEF2FF',color:'var(--navy2)',tag:'Fond',tagBg:'#EEF2FF',tagColor:'var(--navy2)'};
  if(desc.includes('commission')||desc.includes('parrain')||desc.includes('filleul'))
    return {ico:'🤝',bg:'#FEF3C7',color:'#92400E',tag:'Parrainage',tagBg:'#FEF3C7',tagColor:'#92400E'};
  if(desc.includes('retrait'))
    return {ico:'💸',bg:'#FEE2E2',color:'#DC2626',tag:'Retrait',tagBg:'#FEE2E2',tagColor:'#DC2626'};
  if(desc.includes('recharge')||desc.includes('dépôt'))
    return {ico:'💰',bg:'#ECFDF5',color:'#065F46',tag:'Recharge',tagBg:'#ECFDF5',tagColor:'#065F46'};
  if(desc.includes('bonus')||desc.includes('admin'))
    return {ico:'🎁',bg:'var(--gold-l)',color:'#92400E',tag:'Bonus',tagBg:'var(--gold-l)',tagColor:'#92400E'};
  const pos=parseFloat(tx.amount)>0;
  return {ico:pos?'💰':'💳',bg:pos?'#ECFDF5':'#FEE2E2',color:pos?'#065F46':'#DC2626',tag:pos?'Crédit':'Débit',tagBg:pos?'#ECFDF5':'#FEE2E2',tagColor:pos?'#065F46':'#DC2626'};
}

async function loadData(){
  if(!uid) return;
  const since=currentPeriod===9999?null:new Date(Date.now()-currentPeriod*86400000).toISOString();
  let q=sb.from('transactions').select('*').eq('user_id',uid).order('created_at',{ascending:false}).limit(500);
  if(since) q=q.gte('created_at',since);
  const {data,error}=await q;
  if(error){document.getElementById('tx-list').innerHTML='<div class="spinner-wrap">❌ Erreur de chargement</div>';return;}
  allTx=data||[];
  computeStats();
  applyFilter();
}

function computeStats(){
  const gains=allTx.filter(t=>parseFloat(t.amount)>0);
  const total=gains.reduce((s,t)=>s+parseFloat(t.amount||0),0);
  document.getElementById('stat-total').textContent=fmt(total);
  document.getElementById('stat-count').textContent=allTx.length;
  document.getElementById('stat-period').textContent='sur '+currentPeriod+(currentPeriod===9999?' (tout)':' jours');
  document.getElementById('top-period').textContent=currentPeriod===9999?'Tout':''+currentPeriod+' jours';

  // Regrouper par jour
  const byDay={};
  gains.forEach(t=>{
    const d=new Date(t.created_at).toDateString();
    byDay[d]=(byDay[d]||0)+parseFloat(t.amount||0);
  });
  const days=Object.values(byDay);
  const activeDays=days.length;
  const avg=activeDays>0?total/activeDays:0;
  const best=Math.max(...days,0);
  const bestDate=Object.keys(byDay).find(k=>byDay[k]===best);
  document.getElementById('stat-avg').textContent=fmt(avg);
  document.getElementById('stat-days').textContent=activeDays+' jour'+(activeDays>1?'s':'')+' actifs';
  document.getElementById('stat-best').textContent=fmt(best);
  document.getElementById('stat-best-date').textContent=bestDate?new Date(bestDate).toLocaleDateString('fr-FR',{day:'2-digit',month:'short'}):'—';

  // Résumé par type
  const taches=gains.filter(t=>(t.description||'').toLowerCase().includes('tâche')||(t.description||'').toLowerCase().includes('tache')||(t.description||'').toLowerCase().includes('task'));
  const fonds=gains.filter(t=>(t.description||'').toLowerCase().includes('fond')||(t.description||'').toLowerCase().includes('retour'));
  const parrain=gains.filter(t=>(t.description||'').toLowerCase().includes('commission')||(t.description||'').toLowerCase().includes('parrain'));
  document.getElementById('sum-taches').textContent=fmt(taches.reduce((s,t)=>s+parseFloat(t.amount||0),0));
  document.getElementById('sum-fonds').textContent=fmt(fonds.reduce((s,t)=>s+parseFloat(t.amount||0),0));
  document.getElementById('sum-parrain').textContent=fmt(parrain.reduce((s,t)=>s+parseFloat(t.amount||0),0));

  // Mini graphique 7 jours
  buildChart(gains);
}

function buildChart(gains){
  const bars=document.getElementById('chart-bars');
  bars.innerHTML='';
  const days=[];
  for(let i=6;i>=0;i--){
    const d=new Date();d.setDate(d.getDate()-i);
    days.push({date:d,label:d.toLocaleDateString('fr-FR',{weekday:'short'}).slice(0,2),key:d.toDateString()});
  }
  const byDay={};
  gains.forEach(t=>{
    const k=new Date(t.created_at).toDateString();
    byDay[k]=(byDay[k]||0)+parseFloat(t.amount||0);
  });
  const vals=days.map(d=>byDay[d.key]||0);
  const max=Math.max(...vals,0.01);
  const today=new Date().toDateString();
  days.forEach((d,i)=>{
    const pct=Math.max((vals[i]/max)*100,3);
    const isToday=d.date.toDateString()===today;
    bars.innerHTML+=`<div class="bar-wrap">
      <div class="bar${isToday?' active':''}" style="height:${pct}%;" title="${fmt(vals[i])}"></div>
      <span class="bar-lbl">${d.label}</span>
    </div>`;
  });
}

function applyFilter(){
  offset=0;
  filtered=allTx.filter(t=>{
    if(currentType==='all') return true;
    const desc=(t.description||t.type||'').toLowerCase();
    if(currentType==='credit') return parseFloat(t.amount)>0;
    if(currentType==='retrait') return desc.includes('retrait');
    if(currentType==='tache') return desc.includes('tâche')||desc.includes('tache')||desc.includes('task');
    if(currentType==='fond') return desc.includes('fond')||desc.includes('invest');
    if(currentType==='commission') return desc.includes('commission')||desc.includes('parrain');
    return true;
  });
  document.getElementById('tx-count').textContent=filtered.length+' transaction'+(filtered.length>1?'s':'');
  renderList();
}

function renderList(){
  const slice=filtered.slice(0,offset+PAGE);
  if(!slice.length){
    document.getElementById('tx-list').innerHTML=`<div class="empty-state"><div class="es-ico">📭</div><div class="es-title">Aucune transaction</div><div class="es-sub">Aucune transaction trouvée pour cette période et ce filtre.</div></div>`;
    document.getElementById('btn-more').style.display='none';
    return;
  }
  let html='';let lastDay='';
  slice.forEach(t=>{
    const s=getTxStyle(t);
    const day=dayStr(t.created_at);
    if(day!==lastDay){html+=`<div class="date-group">${day}</div>`;lastDay=day;}
    const amt=parseFloat(t.amount||0);
    const sign=amt>0?'+':'';
    html+=`<div class="tx-item">
      <div class="tx-ico" style="background:${s.bg};">${s.ico}</div>
      <div class="tx-info">
        <div class="tx-desc">${t.description||t.type||'Transaction'}</div>
        <div class="tx-date">${ago(t.created_at)}</div>
        <span class="tx-tag" style="background:${s.tagBg};color:${s.tagColor};">${s.tag}</span>
      </div>
      <div class="tx-amt ${amt>=0?'plus':'minus'}">${sign}${fmt(Math.abs(amt))}</div>
    </div>`;
  });
  document.getElementById('tx-list').innerHTML=html;
  document.getElementById('btn-more').style.display=filtered.length>offset+PAGE?'block':'none';
}

function loadMore(){offset+=PAGE;renderList();}

function setPeriod(days,btn){
  currentPeriod=days;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  loadData();
}

function setType(type,btn){
  currentType=type;
  document.querySelectorAll('.type-btn').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  applyFilter();
}

async function init(){
  const {data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='index.html';return;}
  uid=session.user.id;
  await loadData();
}
init();
</script>
<script src="security.js"></script>
</body>
</html>
